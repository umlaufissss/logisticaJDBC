version: '3.8'
services:
  db:
    image: mysql/mysql-server:latest
    container_name: transportadora
    restart: always
    environment:
      - MYSQL_DATABASE=transportadora
      - MYSQL_ROOT_PASSWORD=mysqlTrans
    ports:
      - '3307:3306'
    volumes:
      - mysql-volume:/var/lib/mysql
volumes:
  mysql-volume:
    driver: local